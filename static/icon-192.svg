<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Token ring (outer) -->
  <circle cx="64" cy="58" r="34" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="3"/>
  <circle cx="64" cy="58" r="34" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Token ring notches (like a coin edge) -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round">
    <line x1="64" y1="22" x2="64" y2="26"/>
    <line x1="64" y1="90" x2="64" y2="94"/>
    <line x1="28" y1="58" x2="32" y2="58"/>
    <line x1="96" y1="58" x2="100" y2="58"/>
    <!-- Diagonal notches -->
    <line x1="39.6" y1="33.6" x2="42.4" y2="36.4"/>
    <line x1="88.4" y1="33.6" x2="85.6" y2="36.4"/>
    <line x1="39.6" y1="82.4" x2="42.4" y2="79.6"/>
    <line x1="88.4" y1="82.4" x2="85.6" y2="79.6"/>
  </g>
  <!-- TK Letters -->
  <text x="64" y="66" text-anchor="middle" font-family="'Arial Black', 'Helvetica', sans-serif" font-weight="900" font-size="32" fill="rgba(0,0,0,0.2)" letter-spacing="-1">TK</text>
  <text x="64" y="65" text-anchor="middle" font-family="'Arial Black', 'Helvetica', sans-serif" font-weight="900" font-size="32" fill="white" letter-spacing="-1">TK</text>
  <!-- Hammer/craft accent (small anvil shape at bottom) -->
  <g transform="translate(64,102)">
    <rect x="-14" y="-4" width="28" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="-8" y="-8" width="16" height="5" rx="1.5" fill="rgba(255,255,255,0.45)"/>
  </g>
</svg>
