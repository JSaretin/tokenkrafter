services:
  ws-indexer:
    build: ./daemons
    command: bun ws-indexer.mjs
    env_file: .envs/indexer.env
    restart: always
    depends_on: [redis]
    volumes:
      - indexer-data:/app/data

  safu:
    build: ./daemons
    command: bun safu-indexer.mjs
    env_file: .envs/indexer.env
    restart: always
    volumes:
      - .envs/SafuLens.json:/app/SafuLens.json:ro

  rates:
    build: ./daemons
    command: bun rate-updater.mjs
    env_file: .envs/indexer.env
    restart: always

  launch-buy-bot:
    build: ./daemons
    command: bun launch-buy-bot.mjs
    env_file: .envs/launch-buy-bot.env
    restart: "no"
    profiles: [bots]

  payment:
    build: ./payment-server
    command: bun payment.mjs
    env_file: .envs/payment.env
    restart: always
    ports:
      - "4100:4100"

  processor:
    build: ./payment-server
    command: bun processor.mjs
    env_file: .envs/processor.env
    restart: always
    depends_on: [redis]

  onramp-delivery:
    build: ./payment-server
    command: bun onramp-delivery.mjs
    env_file: .envs/onramp-delivery.env
    restart: always
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

volumes:
  indexer-data:
  redis-data:
