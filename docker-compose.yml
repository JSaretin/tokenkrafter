# Compose loads each service's env_file list in order. Earlier files
# define defaults, later files override. Keep `global.env` first so
# every service inherits shared values (RPC, FLW key, TX_CONFIRM_SECRET,
# etc.) and the per-service file only carries deltas.

services:
  ws-indexer:
    build: ./daemons
    command: bun ws-indexer.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/indexer.env
    restart: always
    depends_on: [redis]
    volumes:
      - indexer-data:/app/data
      # SafuLens bytecode for on-create rug-checks. Without it, ws-indexer
      # logs "SafuLens bytecode not found — on-create SAFU checks disabled"
      # and falls back to scoring after the safu sweep cycle picks tokens up.
      - .envs/prod/SafuLens.json:/app/SafuLens.json:ro

  safu:
    build: ./daemons
    command: bun safu-indexer.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/indexer.env
    restart: always
    volumes:
      - .envs/prod/SafuLens.json:/app/SafuLens.json:ro

  rates:
    build: ./daemons
    command: bun rate-updater.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/indexer.env
    restart: always

  activity-bot:
    build: ./daemons
    command: bun activity-bot.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/activity-bot.env
    restart: "no"
    profiles: [bots]
    volumes:
      - activity-bot-data:/app/data

  launch-buy-bot:
    build: ./daemons
    command: bun launch-buy-bot.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/launch-buy-bot.env
    restart: "no"
    profiles: [bots]
    volumes:
      - launch-buy-bot-data:/app/data

  payment:
    build: ./payment-server
    command: bun payment.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/payment.env
    restart: always
    ports:
      - "4100:4100"

  processor:
    build: ./payment-server
    command: bun processor.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/processor.env
    restart: always
    depends_on: [redis]

  onramp-delivery:
    build: ./payment-server
    command: bun onramp-delivery.mjs
    env_file:
      - .envs/prod/global.env
      - .envs/prod/onramp-delivery.env
    restart: always
    depends_on: [redis]

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

volumes:
  indexer-data:
  redis-data:
  activity-bot-data:
  launch-buy-bot-data:
